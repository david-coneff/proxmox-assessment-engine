# BFVault / CAB Schema
# Defines the structure of BFVault encrypted vault payloads and CAB (single-asset bundles).
# See ARCHITECTURE.md AD-088 (BFVault) and AD-089 (CAB).
#
# Outer ZIP structure (applies to both BFVault and CAB):
#   bfvault-{YYYY-MM-DD}-{label}.zip
#   ├── meta.json          -- plaintext KDF parameters
#   ├── payload.enc        -- AES-256-GCM encrypted inner payload (raw bytes)
#   └── bfvault.html       -- self-contained browser tool (viewer / editor / re-exporter)
#
# meta.json schema (outer, plaintext):
#   {
#     "v": 1,
#     "format": "bfvault" | "cab",
#     "alg": "AES-256-GCM",
#     "kdf": "PBKDF2-SHA256",
#     "iter": 600000,
#     "salt": "<base64 16 bytes>",
#     "iv":   "<base64 12 bytes>",
#     "label": "<vault label or asset-id>",
#     "created": "<ISO-8601 UTC>"
#   }
#
# payload.enc: raw AES-256-GCM ciphertext (includes 16-byte GCM auth tag appended)
# Decrypted payload: UTF-8 JSON matching vault_payload (BFVault) or cab_payload (CAB) below.

# ─── KDF / Crypto ───────────────────────────────────────────────────────────
crypto:
  algorithm: AES-256-GCM
  kdf: PBKDF2-SHA256
  iterations: 600000          # NIST SP 800-132 2023 floor for backup-grade passphrases
  salt_bytes: 16
  iv_bytes: 12
  tag_bytes: 16               # GCM auth tag (appended to ciphertext)
  web_crypto_compatible: true  # All primitives available in SubtleCrypto — no WASM needed

# ─── BFVault inner payload (vault_payload) ──────────────────────────────────
vault_payload:
  # Top-level keys
  bfvault: "1"                # format version
  label: string               # human label, e.g. "homelab-main"
  created: ISO-8601-UTC
  modified: ISO-8601-UTC
  assets:
    # Keyed by asset_id (slug, e.g. "node01-luks-rootfs")
    "{asset_id}": asset       # see asset schema below

# ─── Asset schema ────────────────────────────────────────────────────────────
asset:
  # Required
  type: |
    credential        # username + password (+ optional TOTP seed)
    ssh-key           # private key material
    luks-header       # binary LUKS/dm-crypt volume header
    certificate       # TLS/CA cert + optional private key
    totp              # standalone TOTP seed (RFC 6238)
    recovery-codes    # backup codes (list of strings)
    keepass-database  # .kdbx file as binary attachment
    note              # freeform text
    generic-binary    # any binary artifact
  label: string               # human-readable display name
  created: ISO-8601-UTC
  modified: ISO-8601-UTC

  # Optional metadata
  tags: [string]              # e.g. ["node01", "luks", "storage"]
  node: string                # cell_codename or hostname this asset belongs to (AD-085)
  group: string               # logical group, maps to KeePass Group path

  # CAM integration (AD-086 / AD-087)
  secrets_path: string        # secrets:// URI, e.g. secrets://crypto/luks/node01/rootfs/passphrase
  artifact_path: string       # artifacts:// URI for binary attachment, if applicable
  keepass_group: string       # KeePass Group path for broker navigation, e.g. Crypto/LUKS/node01
  asset_id_uri: string        # same as secrets_path — stored as KeePass AssetID custom field

  # Fields (plaintext key-value pairs, visible after decryption)
  # Standard field names by type:
  fields:
    # credential
    username: string
    password: string
    url: string
    totp_seed: string         # base32 TOTP seed
    notes: string
    # ssh-key
    private_key: string       # PEM or OpenSSH format (base64-safe as JSON string)
    public_key: string
    key_comment: string
    # certificate
    cert_pem: string
    key_pem: string
    ca_pem: string
    # totp
    seed: string
    issuer: string
    # recovery-codes
    codes: [string]           # list of one-time codes
    # note
    content: string
    # Any additional custom fields are allowed (open map)
    "{custom_key}": string

  # Binary attachments (base64-encoded, preserves original bytes exactly)
  attachments:
    "{filename.ext}":
      type: string            # MIME type, e.g. application/octet-stream
      data: base64-string     # standard base64 (RFC 4648)
      sha256: hex-string      # hex SHA-256 of raw bytes (before base64), for integrity check
      size_bytes: integer

# ─── CAB inner payload (cab_payload) ─────────────────────────────────────────
# A CAB is a vault_payload with exactly one asset and format="cab".
cab_payload:
  bfvault: "1"
  format: "cab"
  asset_id: string            # the single asset's id
  label: string
  created: ISO-8601-UTC
  assets:
    "{asset_id}": asset       # exactly one entry

# ─── KeePass XML import (generated by bfvault.html) ─────────────────────────
# Standard KeePass 2.x XML format; KeePassXC imports via Database → Import → KeePass XML.
# Generated file is named keepass-import.xml inside the vault's downloaded ZIP or as a
# standalone export from bfvault.html.
#
# Entry field mapping:
#   Title      = asset.label
#   UserName   = asset.fields.username (or empty)
#   Password   = asset.fields.password (or primary secret value)
#   URL        = asset.fields.url (or empty)
#   Notes      = asset.fields.notes (or generated summary)
#   AssetID    = asset.secrets_path  (custom field — secrets broker lookup key, AD-087)
#   SecretsPath = asset.secrets_path (custom field — duplicate for clarity)
#   ArtifactPath = asset.artifact_path (custom field, if applicable)
#   NodeRef    = asset.node (custom field)
# Binary attachments map directly to KeePass entry attachments (Base64 in <Binary> elements).
# SHA-256 hash stored as custom field: "{filename}-sha256" = asset.attachments[filename].sha256
#
# Group hierarchy: all assets imported into group "BFVault/{asset.group or asset.type}"
# so they do not pollute existing KeePass tree structure.

keepass_import:
  group_root: "BFVault"
  entry_fields:
    Title: asset.label
    UserName: asset.fields.username
    Password: asset.fields.password
    URL: asset.fields.url
    Notes: asset.fields.notes
  custom_fields:
    AssetID: asset.secrets_path
    SecretsPath: asset.secrets_path
    ArtifactPath: asset.artifact_path
    NodeRef: asset.node
    BFVaultType: asset.type
    BFVaultCreated: asset.created
    # Per-attachment: "{filename}-sha256"
  attachments: asset.attachments  # each key becomes a KeePass binary attachment entry

# ─── secrets:// URI scheme (AD-086) ─────────────────────────────────────────
# Format: secrets://<authority-class>/<asset-type>/<scope>/<label>
# Examples:
#   secrets://crypto/luks/node01/rootfs/passphrase
#   secrets://admin/credential/proxmox/api-token
#   secrets://infra/ssh-key/forgejo/deploy
#   secrets://backup/credential/restic/b2-password
#
# artifacts:// URI scheme:
#   artifacts://crypto/luks/node01/rootfs/header
#   artifacts://infra/certificate/cluster/ca-cert
#
# BFVault maps asset_id → secrets_path to give the broker a stable lookup key
# that is independent of KeePass entry location.

uri_scheme:
  secrets:
    pattern: "secrets://{authority-class}/{asset-type}/{scope}/{label}"
    example: "secrets://crypto/luks/node01/rootfs/passphrase"
  artifacts:
    pattern: "artifacts://{authority-class}/{asset-type}/{scope}/{label}"
    example: "artifacts://crypto/luks/node01/rootfs/header"

# ─── bfvault.html tool capabilities ─────────────────────────────────────────
tool:
  file: docs/bfvault.html
  dependencies: none          # Web Crypto API + hand-rolled ZIP builder (no CDN, no WASM)
  offline: true
  features:
    - Create new empty vault
    - Open existing vault (drag-and-drop payload.enc + meta.json, or pick from extracted ZIP)
    - Add / edit / delete assets with any fields and binary attachments
    - Export encrypted vault ZIP (re-includes bfvault.html in output)
    - Export single asset as CAB ZIP
    - Import CAB into current vault session
    - Generate KeePass XML for batch import into KeePassXC
    - Passphrase generator (adjective.animal.adjective.animal.NN format, matching walkthrough export)
    - SHA-256 integrity check on loaded attachment bytes
