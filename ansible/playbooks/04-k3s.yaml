---
# Playbook 04-k3s — install k3s control plane
# Requires: 01-common, 02-forgejo, 03-operations must have run first.
# config.yaml must be present in roles/k3s-server/files/ (generated by Phase 2).
# Target: k3s_servers group

- name: Install and configure k3s server nodes
  hosts: k3s_servers
  become: true
  gather_facts: true
  serial: 1
  # serial: 1 — in HA mode, initialize first server before joining others

  roles:
    - role: k3s-server
