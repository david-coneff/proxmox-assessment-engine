---
# k3s-server role — install and configure k3s control plane
# config.yaml is pre-generated by generators/k3s-config-gen.py (Phase 2).
# Idempotent: k3s install script is a no-op if version matches.

- name: Create /etc/rancher/k3s directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy k3s config.yaml (generated by Phase 2)
  ansible.builtin.copy:
    src: config.yaml
    dest: "{{ k3s_config_path }}"
    owner: root
    group: root
    mode: "0600"
  notify: restart k3s

- name: Download k3s install script
  ansible.builtin.get_url:
    url: "{{ k3s_install_script_url }}"
    dest: /tmp/k3s-install.sh
    mode: "0700"

- name: Run k3s install (idempotent — skips if version matches)
  ansible.builtin.command: /tmp/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_SKIP_START: "true"
  args:
    creates: /usr/local/bin/k3s
  notify: restart k3s

- name: Enable and start k3s
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for k3s to be ready
  ansible.builtin.command: k3s kubectl get nodes
  register: k3s_ready
  retries: 20
  delay: 10
  until: k3s_ready.rc == 0
  changed_when: false

- name: Create .kube directory for k3s user
  ansible.builtin.file:
    path: "/home/{{ k3s_user }}/.kube"
    state: directory
    owner: "{{ k3s_user }}"
    group: "{{ k3s_user }}"
    mode: "0700"

- name: Copy kubeconfig for k3s user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ k3s_user }}/.kube/config"
    owner: "{{ k3s_user }}"
    group: "{{ k3s_user }}"
    mode: "0600"
    remote_src: true

- name: Allow k3s API port through UFW
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp

- name: Remove k3s install script
  ansible.builtin.file:
    path: /tmp/k3s-install.sh
    state: absent
