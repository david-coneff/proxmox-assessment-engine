# Machine form of the UPCCP-CSP envelope shape — UPCCP-CSP.md §1-2.
# Describes the envelope's STRUCTURE (header/payload/footer), not any
# particular payload's content (that's the referenced Schema-ID's job).

format_id: UPCCP
format_version: "1.0"
governed_by: UPCCP-CSP.md

envelope:
  leading_line:
    pattern: "<Format-ID>-<Format-Version>"
    example: "UPCCP-1.0"

  header:
    required_fields:
      - name: Encoding
        example: JSON
      - name: Compression
        example: zlib
      - name: Schema-ID
        example: PAP-RUNTIME-3
      - name: Schema-Hash
        format: "SHA256:<hex>"
      - name: Interpreter
        example: UPCCP-Decoder
      - name: Version
        example: "1.0"
      - name: Payload-Hash
        format: "SHA256:<hex>"

  instructions:
    type: ordered prose steps
    required: true
    description: >
      Human-readable decode steps included for portability — a decoder
      contract (UPCCP-CSP.md §4) is normative, but inline instructions
      let a reader without the spec still attempt reconstruction
      (Reconstruction Requirement, PAP-Core §7).

  payload:
    delimiters:
      begin: "-----BEGIN PAYLOAD-----"
      end: "-----END PAYLOAD-----"
    content: opaque binary/compressed bytes (governed by Encoding + Compression)

  integrity_footer:
    type: JSON object
    required_fields:
      - payload_sha256   # must equal header Payload-Hash
      - bootstrap_sha256 # hash of the minimal bootstrap/decoder reference

decoder_contract: UPCCP-Decoder   # see UPCCP-CSP.md §4 for the 7-step procedure

versioning:
  envelope_structure_change: requires Format-Version increment
  referenced_schema_change: requires only a Schema-Hash update
