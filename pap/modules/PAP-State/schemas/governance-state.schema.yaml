# Schema (machine form) for a Governance State snapshot — PAP-State §7.
# Answers "what governance is currently active, pending, or contested?"
# Resolves one of UPCCMP's six named future-work items
# (Gap Analysis §2.2: "governance_state_schema").

schema_id: PAP-STATE-GOVERNANCE-STATE
schema_version: "1.0"
governed_by: ../PAP-State.md#7-schemas-machine-form

fields:
  active_governance:
    type: array
    required: true
    items:
      artifact: string
      authority_level: integer
      description: >
        Reference to PAP-Core §4 Authority Hierarchy levels (1-8).
        Every artifact currently in force, with its precedence level.

  pending_adoption:
    type: array
    required: false
    items:
      artifact: string
      status: string
      description: >
        Proposed governance not yet adopted (e.g. a Decision Record
        awaiting review, a draft snapshot awaiting finalization).

  contested:
    type: array
    required: false
    items:
      description: string
      conflicting_artifacts: array
      resolution_status: string
      enum_resolution_status: [unresolved, resolved-recorded, escalated]
    description: >
      Open Contradiction Governance entries (PAP-State §6.4) and
      Authority Conflict Resolution Procedure cases (PAP-Core §4)
      that have not reached a closed state. Per PAP-Core §6.3,
      unresolved disagreements are preserved here, not hidden.

  last_reviewed:
    type: string
    format: timestamp
    required: true
