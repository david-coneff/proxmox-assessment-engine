# Schema (machine form) for the Session Handoff artifact — PAP-State §4.
# An instance is the structured twin of a SESSION_HANDOFF.md (or the
# .md itself, if it follows this field order in its prose sections).

schema_id: PAP-STATE-SESSION-HANDOFF
schema_version: "1.0"
governed_by: ../PAP-State.md#4-session-handoff-protocol

fields:
  status:
    type: string
    required: true
    description: One-line current status (e.g. "IN PROGRESS", "BLOCKED").

  objective:
    type: string
    required: true

  source_materials:
    type: array
    required: false
    items:
      path: string
      why: string
    description: >
      What a resuming agent must read, and why each item matters —
      prevents redundant re-derivation (Completeness Preference
      Principle, PAP-Core §5).

  key_decisions_and_insights:
    type: array
    items: string
    required: false
    description: >
      Conclusions already reached that should not be re-derived from
      scratch by the next session.

  milestone_checklist:
    type: array
    required: true
    items:
      label: string
      done: boolean

  last_completed_step:
    type: string
    required: true

  next_action:
    type: string
    required: true

  resume_instructions:
    type: array
    items: string
    required: true
    description: Ordered steps for resuming if the session is interrupted.

  resume_block_ref:
    type: string
    description: >
      Pointer to the current resume-block instance
      (resume-block.schema.yaml) — a Session Handoff carries a Resume
      Block, it does not redefine one.
