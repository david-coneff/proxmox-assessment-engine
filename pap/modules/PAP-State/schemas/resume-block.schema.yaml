# Schema (machine form) for the Project Resume Block — PAP-State §3.
# An instance conforming to this shape is a *.resume.yaml file (or the
# `resume_block` section of a SESSION_HANDOFF.md's machine-form twin).
# This is a SHAPE definition, not a live instance — see PAP-State §7
# on the schema/instance namespacing rule.

schema_id: PAP-STATE-RESUME-BLOCK
schema_version: "1.0"
governed_by: ../PAP-State.md#3-project-resume-block

fields:
  project_identity:
    type: string
    required: true
    description: What this project is, in one or two sentences.

  active_objective:
    type: string
    required: true
    description: What is currently being pursued.

  active_milestone:
    type: string
    required: true
    description: Where in that pursuit things currently stand.

  active_risks:
    type: array
    items: string
    required: false

  blockers:
    type: array
    items: string
    required: false

  next_action:
    type: string
    required: true
    description: >
      Concrete enough that a cold reader (no prior context) can begin
      immediately without further clarification.

update_trigger:
  - at minimum, at every session boundary
  - at every major milestone
