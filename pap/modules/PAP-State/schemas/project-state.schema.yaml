# Schema (machine form) for a Project State snapshot — PAP-State §7.
# Answers "what is the project, right now?" — suitable as the payload
# an agent serializes via UPCCP-CSP at CBMF Level 5
# (see ../../../serialization/UPCCP-CSP/UPCCP-CSP.md).
# Resolves one of UPCCMP's six named future-work items
# (Gap Analysis §2.2: "project_state_serialization_specification" /
# "define_project_state_schema").

schema_id: PAP-RUNTIME-3
schema_version: "1.0"
governed_by: ../PAP-State.md#7-schemas-machine-form

fields:
  project_identity:
    type: string
    required: true

  objective:
    type: string
    required: true

  milestones:
    type: array
    required: true
    items:
      label: string
      status: string
      enum_status: [not-started, in-progress, done, blocked]

  risks:
    type: array
    items: string
    required: false

  tracked_concerns:
    type: object
    required: true
    description: >
      Live registries for the six PAP-State §6 governance-of-substance
      categories. Each is a pointer to where its records live in the
      Repository Memory Structure (PAP-State §2), not an inline copy.
    fields:
      evidence: { type: string, description: "pointer to evidence registry" }
      decisions: { type: string, description: "pointer to Decision Records" }
      assumptions: { type: string, description: "pointer to assumption log" }
      contradictions: { type: string, description: "pointer to contradiction log" }
      change_impact_assessments: { type: string, description: "pointer to assessment records" }
      dependencies: { type: string, description: "pointer to dependency registry" }

  resume_block_ref:
    type: string
    description: Pointer to the current resume-block instance.

  serialized_at:
    type: string
    format: timestamp
    required: true

# Note for UPCCP-CSP integration: when this schema is named as the
# Schema-ID of a UPCCP-CSP envelope, the envelope's Schema-Hash field
# must equal SHA-256 of this file's canonical content, so a decoder
# can verify it holds the correct schema version before mapping state
# IDs (see UPCCP-CSP.md §3, Decoder Contract, step 5).
