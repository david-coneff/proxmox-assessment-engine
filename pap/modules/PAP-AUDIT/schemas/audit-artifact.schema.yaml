# Schema (machine form) for an Audit Artifact / Status Record — PAP-AUDIT §4.
# Formalizes the shape first observed (ungoverned) as `pap_audit_status`
# in UPCCMP_PROTOCOL_RESUME_BLOCK.yaml. Resolves one of UPCCMP's six
# named future-work items (Gap Analysis §2.2: "audit_artifact_schema").

schema_id: PAP-AUDIT-ARTIFACT
schema_version: "1.0"
governed_by: ../PAP-AUDIT.md#4-audit-verdict-and-status-record

fields:
  audited_artifact:
    type: string
    required: true
    description: Identity (filename / CID) of the artifact under audit.

  audited_by:
    type: string
    required: true
    description: Identity of the auditing protocol/module version.

  readiness_verdict:
    type: string
    required: true
    enum: [ready, conditionally_ready, not_ready]

  blocking_findings:
    type: array
    required: false
    items:
      finding: string
      classification: string
      enum_classification: [BLOCKER, DEFECT, RISK, IMPROVEMENT, OBSERVATION]
    description: >
      Required (non-empty) when readiness_verdict is
      conditionally_ready or not_ready — must contain at least one
      entry classified BLOCKER explaining why.

  apdrp_review_ref:
    type: string
    required: false
    description: >
      Pointer to the full four-perspective APDRP review record, if one
      was performed for this audit (PAP-AUDIT §2).

  audited_at:
    type: string
    format: timestamp
    required: true

# Worked example (retroactive instance, predates this schema):
# UPCCMP_PROTOCOL_RESUME_BLOCK.yaml -> pap_audit_status:
#   audited_artifact: UPCCMP_2026-06-06_22-09_6f0d84e1
#   audited_by: PAP_2026-06-06_22-39_db890ad4
#   readiness_verdict: conditionally_ready
#   blocking_findings:
#     - finding: operational_sections_require_further_specification
#       classification: BLOCKER
