# PAP-Core module manifest (machine form)
#
# Authoritative registry of every module in the PAP family: where it
# lives, what it's for, when it should be loaded, and what machine-form
# schemas it carries. PAP-Core is always loaded; everything below loads
# on demand per its trigger. Per PAP-Core §10 (Module Governance), this
# file is updated in the same revision as any module addition, removal,
# or rescoping.

manifest_version: "1.0"

core:
  human_form: core/PAP-Core.md
  always_loaded: true

modules:

  - name: PAP-State
    human_form: modules/PAP-State/PAP-State.md
    scope: >
      Session continuity, runtime state management, repository memory
      structure, startup protocol, resume/handoff, and governance of
      tracked project understanding (evidence, decisions, assumptions,
      contradictions, change-impact, dependencies).
    load_when:
      - session start (Startup Protocol)
      - session end / milestone (Session Handoff)
      - any task touching project state, continuity, or decision/
        evidence/assumption tracking
    schemas:
      - modules/PAP-State/schemas/resume-block.schema.yaml
      - modules/PAP-State/schemas/session-handoff.schema.yaml
      - modules/PAP-State/schemas/governance-state.schema.yaml
      - modules/PAP-State/schemas/project-state.schema.yaml

  - name: PAP-AUDIT
    human_form: modules/PAP-AUDIT/PAP-AUDIT.md
    scope: >
      Systematic review, finding classification, Adversarial
      Perspectives Deep Review Protocol (APDRP), and the audit-record
      contract (verdict taxonomy, blocking findings).
    load_when:
      - performing or recording a review, audit, or major-change
        evaluation (Core §6.3 Adversarial Review Governance)
    schemas:
      - modules/PAP-AUDIT/schemas/audit-artifact.schema.yaml

  - name: PAP-X
    human_form: modules/PAP-X/PAP-X.md
    scope: >
      Deep analysis / extended-reasoning procedures for multi-session
      investigations, lineage reconstruction, gap analysis, and
      multi-document synthesis — including a named six-stage procedure
      generalized from the synthesis that produced this revision
      (see module file §1).
    load_when:
      - undertaking a multi-document synthesis or lineage-reconstruction
        task analogous to the one that produced this revision
    schemas: []

  - name: PAP-Serialize
    alias: UPCCP-CSP
    human_form: serialization/UPCCP-CSP/UPCCP-CSP.md
    scope: >
      Serialization governance and the UPCCP-CSP wire format — the
      CBMF Level 5 transport mechanism. Transports state; does not
      manage it (PAP-State manages; PAP-Serialize transports).
    load_when:
      - CBMF escalation has reached Level 5 (Core §5.2)
      - decoding or producing a UPCCP-CSP envelope
    schemas:
      - serialization/UPCCP-CSP/UPCCP-CSP.schema.yaml
    examples:
      - serialization/UPCCP-CSP/examples/sample.upccp

  - name: Compatibility
    human_form: compatibility/Platform-Compatibility-Profiles.md
    scope: >
      Registry of empirically verified (protocol/module/environment/
      agent) combinations. Records facts about what has been observed
      to work; never introduces platform requirements into the spec.
    load_when:
      - selecting a serialization format or evaluating whether a given
        execution environment has known compatibility issues
    schemas: []

# Instance directories (NOT specs — populated during real operation;
# see PAP-Core §3 Lineage Governance and PAP-State §7 schema/instance
# namespacing rule: *.schema.yaml = shape, *.state.yaml = live data).
instance_directories:
  state: state/
  audits: audits/
  revisions: revisions/
