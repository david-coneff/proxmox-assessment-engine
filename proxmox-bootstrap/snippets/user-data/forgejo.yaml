#cloud-config
# forgejo.yaml — Cloud-Init user-data for forgejo VM
# Cell:    proxmox-cell-a
# VM ID:   101
# Role:    forgejo (Git hosting, CI/CD)
# IP:      192.168.1.21
# Secret:  Infrastructure/ssh/deploy-keys/forgejo  (KeePass — private key)
#
# BEFORE UPLOADING: replace the ssh_authorized_keys placeholder with the
# SSH public key corresponding to the private key at the KeePass path above.

hostname: forgejo
fqdn: forgejo.internal

users:
  - name: ubuntu
    gecos: Ubuntu
    groups: [sudo, adm]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh_authorized_keys:
      - "POPULATE: SSH public key — KeePass: Infrastructure/ssh/deploy-keys/forgejo"

timezone: Australia/Melbourne

package_update: true
package_upgrade: false

packages:
  - python3
  - python3-pip
  - qemu-guest-agent
  - openssh-server
  - git
  - curl
  - ca-certificates
  - gnupg

runcmd:
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  - sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart sshd

final_message: |
  Cloud-Init first-boot complete on forgejo (192.168.1.21).
  Ansible will install and configure Forgejo.
  Cell: proxmox-cell-a
