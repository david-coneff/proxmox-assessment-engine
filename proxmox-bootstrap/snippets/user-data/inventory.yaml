hostname: inventory
fqdn: inventory.internal

users:
  - name: ubuntu
    gecos: Ubuntu
    groups: [sudo, adm]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh_authorized_keys:
      - "POPULATE: SSH public key — KeePass: Infrastructure/ssh/deploy-keys/inventory"

timezone: Australia/Melbourne

package_update: true
package_upgrade: false

packages:
  - python3
  - python3-pip
  - qemu-guest-agent
  - openssh-server
  - git
  - curl

runcmd:
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  - sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart sshd
  - mkdir -p /opt/inventory
  - chown ubuntu:ubuntu /opt/inventory

final_message: |
  Cloud-Init first-boot complete on inventory (192.168.1.22).
  Connect via SSH as ubuntu@192.168.1.22 using the deploy key.
  Cell: proxmox-cell-a
