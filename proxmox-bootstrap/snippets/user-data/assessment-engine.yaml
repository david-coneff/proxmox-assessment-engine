#cloud-config
# assessment-engine.yaml — Cloud-Init user-data for assessment-engine VM
# Cell:    proxmox-cell-a
# VM ID:   103
# Role:    assessment-engine (Infrastructure Digital Twin Platform)
# IP:      192.168.1.23
# Secret:  Infrastructure/ssh/deploy-keys/assessment-engine  (KeePass — private key)
#
# BEFORE UPLOADING: replace the ssh_authorized_keys placeholder with the
# SSH public key corresponding to the private key at the KeePass path above.

hostname: assessment-engine
fqdn: assessment.internal

users:
  - name: ubuntu
    gecos: Ubuntu
    groups: [sudo, adm]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh_authorized_keys:
      - "POPULATE: SSH public key — KeePass: Infrastructure/ssh/deploy-keys/assessment-engine"

timezone: Australia/Melbourne

package_update: true
package_upgrade: false

packages:
  - python3
  - python3-pip
  - python3-venv
  - qemu-guest-agent
  - openssh-server
  - git
  - curl
  - jq

runcmd:
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  - sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart sshd
  # Create workspace for assessment engine repositories
  - mkdir -p /opt/assessment
  - chown ubuntu:ubuntu /opt/assessment

final_message: |
  Cloud-Init first-boot complete on assessment-engine (192.168.1.23).
  Ansible will install the assessment engine and configure scheduled assessments.
  Cell: proxmox-cell-a
